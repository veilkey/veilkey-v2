services:
  vaultcenter:
    build:
      context: services/vaultcenter
      args:
        DOCKER_MIRROR: ${DOCKER_MIRROR:-}
    image: veilkey-vaultcenter:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${VAULTCENTER_HOST_PORT:-11181}:10181"
    environment:
      VEILKEY_ADDR: ":10181"
      VEILKEY_DB_PATH: /data/veilkey.db
      VEILKEY_MODE: root
      VEILKEY_AUTO_COMPLETE_INSTALL_FLOW: "${VAULTCENTER_AUTO_COMPLETE_INSTALL_FLOW:-0}"
      VEILKEY_BULK_APPLY_DIR: /data/bulk-apply
      VEILKEY_FUNCTION_DIR: /data/functions
      VEILKEY_AGENT_SCHEME: "${VEILKEY_AGENT_SCHEME}"
      VEILKEY_TRUSTED_IPS: "${VEILKEY_TRUSTED_IPS}"
      VEILKEY_TLS_INSECURE: "1"
    volumes:
      - ${VAULTCENTER_DATA_DIR:-./data/vaultcenter}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:10181/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  localvault:
    build:
      context: services/localvault
      args:
        DOCKER_MIRROR: ${DOCKER_MIRROR:-}
    image: veilkey-localvault:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${LOCALVAULT_HOST_PORT:-11180}:10180"
    environment:
      VEILKEY_ADDR: ":10180"
      VEILKEY_DB_PATH: /data/veilkey.db
      VEILKEY_MODE: child
      VEILKEY_PARENT_URL: "https://vaultcenter:10181"
      VEILKEY_LABEL: "${LOCALVAULT_LABEL:-localvault-01}"
      VEILKEY_VAULTCENTER_URL: "https://vaultcenter:10181"
      VEILKEY_TRUSTED_IPS: "${VEILKEY_TRUSTED_IPS}"
      VEILKEY_TLS_INSECURE: "1"
    volumes:
      - ${LOCALVAULT_DATA_DIR:-./data/localvault}:/data
    depends_on:
      vaultcenter:
        condition: service_healthy
