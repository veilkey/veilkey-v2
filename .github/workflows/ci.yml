name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ── 변경 감지 ─────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # dorny/paths-filter needs this on pull_request events
    outputs:
      vaultcenter: ${{ steps.filter.outputs.vaultcenter }}
      localvault: ${{ steps.filter.outputs.localvault }}
      veil-cli: ${{ steps.filter.outputs.veil-cli }}
      veilkey-cli: ${{ steps.filter.outputs.veilkey-cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vaultcenter:
              - 'services/vaultcenter/**'
            localvault:
              - 'services/localvault/**'
            veil-cli:
              - 'services/veil-cli/**'
            veilkey-cli:
              - 'services/veil-cli/**'

  # ── VaultCenter (Go + SQLCipher) ─────────────────────────────
  vaultcenter:
    needs: changes
    if: needs.changes.outputs.vaultcenter == 'true' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/vaultcenter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: services/vaultcenter/frontend/admin/.node-version
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/vaultcenter/go.mod
      - name: Check UI build is up to date
        run: |
          cd services/vaultcenter/frontend/admin
          npm ci --silent
          npm run build
          if ! diff -qr dist/ ../../internal/api/admin/ui_dist/ > /dev/null 2>&1; then
            echo "::error::ui_dist is out of date — run 'npm run build' in frontend/admin and copy dist/ to ui_dist/"
            exit 1
          fi
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: services/vaultcenter
          version: "v2.4.0"
      - name: Build
        run: CGO_ENABLED=1 go build -o veilkey-vaultcenter ./cmd
      - name: Upload artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: veilkey-vaultcenter-linux-amd64
          path: services/vaultcenter/veilkey-vaultcenter

  # ── LocalVault (Go + SQLCipher) ──────────────────────────────
  localvault:
    needs: changes
    if: needs.changes.outputs.localvault == 'true' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/localvault
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/localvault/go.mod
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: services/localvault
          version: "v2.4.0"
      - name: Build
        run: CGO_ENABLED=1 go build -o veilkey-localvault ./cmd
      - name: Upload artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: veilkey-localvault-linux-amd64
          path: services/localvault/veilkey-localvault

  # ── veil-cli (Rust) ───────────────────────────────────────────
  veil-cli:
    needs: changes
    if: needs.changes.outputs.veil-cli == 'true' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/veil-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/veil-cli
      - name: Format check
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Build
        run: cargo build --release
      - name: Upload artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: veil-cli-linux-amd64
          path: |
            services/veil-cli/target/release/veil
            services/veil-cli/target/release/veilkey

  # ── veilkey-cli (Rust) ────────────────────────────────────────
  veilkey-cli:
    needs: changes
    if: needs.changes.outputs.veilkey-cli == 'true' || github.ref_type == 'tag'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/veil-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/veil-cli
      - name: Format check
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Upload artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: veilkey-cli-linux-amd64
          path: |
            services/veil-cli/target/release/veilkey-cli
            services/veil-cli/target/release/veilkey-session-config

  # ── Release (tag push only) ─────────────────────────────────
  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [vaultcenter, localvault, veil-cli, veilkey-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/**/* || echo "Release already exists"

  # ── PR 게이트 (모든 필수 job 통과 확인) ──────────────────────
  pr-gate:
    if: always()
    needs: [vaultcenter, localvault, veil-cli, veilkey-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.vaultcenter.result }}" "${{ needs.localvault.result }}" "${{ needs.veil-cli.result }}" "${{ needs.veilkey-cli.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed: $r"
              exit 1
            fi
          done
          echo "All jobs passed or skipped"
