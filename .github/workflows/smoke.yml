name: Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'install/**'
      - 'tests/smoke/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/smoke.yml'
  push:
    branches: [main]
    paths:
      - 'install/**'
      - 'tests/smoke/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/smoke.yml'

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y -qq bats

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/veil-cli

      - name: Build images
        run: |
          cp .env.example .env
          echo "VAULTCENTER_AUTO_COMPLETE_INSTALL_FLOW=1" >> .env
          docker compose build

      - name: Start VeilKey services
        run: |
          # Start all services with --no-deps to skip depends_on healthcheck
          docker compose up -d --no-deps vaultcenter
          echo "Waiting for VaultCenter..."
          for i in $(seq 1 90); do
            STATUS=$(curl -sk https://localhost:11181/health 2>/dev/null | grep -o '"status":"[^"]*"' || true)
            echo "  [$i] $STATUS"
            if echo "$STATUS" | grep -qE '"locked"|"ok"|"setup"'; then
              break
            fi
            sleep 3
          done
          # Start localvault and veil independently (skip depends_on healthcheck)
          docker compose up -d --no-deps localvault veil

      - name: Setup and unlock VaultCenter
        run: |
          # Retry setup/init + unlock with backoff
          for i in $(seq 1 30); do
            echo "  Attempt $i..."
            # Try init first (first run)
            curl -sk --max-time 5 -X POST https://localhost:11181/api/setup/init \
              -H 'Content-Type: application/json' \
              -d '{"password":"smoke-test-password","admin_password":"smoke-test-password"}' 2>/dev/null || true
            # Try unlock (after init or restart)
            curl -sk --max-time 5 -X POST https://localhost:11181/api/unlock \
              -H 'Content-Type: application/json' \
              -d '{"password":"smoke-test-password"}' 2>/dev/null || true
            # Check health
            HEALTH=$(curl -sk --max-time 5 https://localhost:11181/health 2>/dev/null || true)
            echo "  Health: $HEALTH"
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "VaultCenter ready!"
              break
            fi
            sleep 3
          done
          # Final check must pass
          curl -sk https://localhost:11181/health | grep -q '"status":"ok"'

      - name: Init and unlock LocalVault
        run: |
          # Wait for localvault to be reachable
          for i in $(seq 1 30); do
            LV_STATUS=$(curl -sk --max-time 5 https://localhost:11180/health 2>/dev/null || true)
            echo "  [$i] LocalVault: $LV_STATUS"
            if echo "$LV_STATUS" | grep -q '"status"'; then break; fi
            sleep 3
          done
          docker compose exec -T localvault sh -c \
            'echo "smoke-test-password" | veilkey-localvault init --root --center https://vaultcenter:10181'
          docker compose restart localvault
          sleep 5
          for i in $(seq 1 20); do
            curl -sk --max-time 5 -X POST https://localhost:11180/api/unlock \
              -H 'Content-Type: application/json' \
              -d '{"password":"smoke-test-password"}' 2>/dev/null || true
            HEALTH=$(curl -sk --max-time 5 https://localhost:11180/health 2>/dev/null || true)
            echo "  [$i] Health: $HEALTH"
            if echo "$HEALTH" | grep -q '"status":"ok"'; then break; fi
            sleep 3
          done
          curl -sk https://localhost:11180/health | grep -q '"status":"ok"'

      - name: Create test secret
        run: |
          # Admin login — extract session cookie from Set-Cookie header
          LOGIN_HEADERS=$(curl -sk -X POST https://localhost:11181/api/admin/login \
            -H 'Content-Type: application/json' \
            -d '{"password":"smoke-test-password"}' \
            -D - -o /dev/null)
          echo "Login headers received"
          SESSION=$(echo "$LOGIN_HEADERS" | grep -i 'set-cookie' | grep -oP 'vk_session=[^;]+' | head -1)
          echo "Session: ${SESSION:0:20}..."

          if [ -z "$SESSION" ]; then
            echo "ERROR: Admin login failed — no session cookie"
            echo "Response headers: $LOGIN_HEADERS"
            exit 1
          fi

          # Create temp ref
          REF_RESPONSE=$(curl -sk -X POST https://localhost:11181/api/keycenter/temp-refs \
            -H 'Content-Type: application/json' \
            -H "Cookie: $SESSION" \
            -d '{"name":"SMOKE_TEST","value":"smoke-test-secret-value"}')
          echo "Temp ref: $REF_RESPONSE"
          TEMP_REF=$(echo "$REF_RESPONSE" | grep -oP '"ref":"VK:TEMP:[^"]+' | cut -d'"' -f4)

          if [ -z "$TEMP_REF" ]; then
            echo "ERROR: Failed to create temp ref"
            exit 1
          fi

          # Get agent hash
          AGENT_HASH=$(curl -sk https://localhost:11181/api/agents | grep -oP '"agent_hash":"[^"]+' | head -1 | cut -d'"' -f4)
          echo "Agent hash: $AGENT_HASH"

          if [ -z "$AGENT_HASH" ]; then
            echo "ERROR: No agents found"
            exit 1
          fi

          # Promote
          PROMOTE_RESPONSE=$(curl -sk -X POST https://localhost:11181/api/keycenter/promote \
            -H 'Content-Type: application/json' \
            -H "Cookie: $SESSION" \
            -d "{\"ref\":\"$TEMP_REF\",\"name\":\"SMOKE_TEST\",\"vault_hash\":\"$AGENT_HASH\"}")
          echo "Promote: $PROMOTE_RESPONSE"
          LOCAL_REF=$(echo "$PROMOTE_RESPONSE" | grep -oP '"token":"VK:LOCAL:[^"]+' | cut -d'"' -f4)

          if [ -z "$LOCAL_REF" ]; then
            echo "ERROR: Failed to promote secret"
            exit 1
          fi

          # Save for tests
          echo "VEILKEY_TEST_REF=$LOCAL_REF" >> "$GITHUB_ENV"
          echo "VEILKEY_TEST_VALUE=smoke-test-secret-value" >> "$GITHUB_ENV"
          echo "Secret created: $LOCAL_REF"

      - name: Run veil-cli smoke tests
        env:
          VEILKEY_URL: https://localhost:11181
        run: |
          bash tests/smoke/run.sh veil-cli

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: tests/smoke/results/*.tap

      - name: Cleanup
        if: always()
        run: docker compose down -v
