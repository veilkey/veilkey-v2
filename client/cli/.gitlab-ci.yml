stages:
  - lint
  - test
  - build
  - release

variables:
  VERSION: "0.3.0"

lint:
  stage: lint
  script:
    - go vet ./...
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

test:
  stage: test
  script:
    - go test -v -race -coverprofile=coverage.out ./...
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

build:
  stage: build
  script:
    - make build-all
  artifacts:
    paths:
      - bin/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  tags:
    - vhost-shell-runner-shared

release:
  stage: release
  script:
    - make package
    - |
      for f in dist/*; do
        filename=$(basename "$f")
        sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
        echo "SHA256 ${filename}: $(cat "${f}.sha256")"
      done
    - |
      for f in dist/*; do
        filename=$(basename "$f")
        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/veilkey-cli/${CI_COMMIT_TAG}/${filename}"
      done
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  tags:
    - vhost-shell-runner-shared
