stages:
  - verify
  - lint
  - test
  - security
  - build
  - package
  - docker
  - deploy

default:
  before_script:
    - cd services/keycenter
    - export GOBIN="${CI_PROJECT_DIR}/.ci-tools/bin"
    - export PATH="${GOBIN}:${PATH}"

.install-golangci-lint: &install-golangci-lint
  - mkdir -p "${GOBIN}"
  - |
    if ! command -v golangci-lint >/dev/null 2>&1; then
      GOBIN="${GOBIN}" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3
    fi

.install-gosec: &install-gosec
  - mkdir -p "${GOBIN}"
  - |
    if ! command -v gosec >/dev/null 2>&1; then
      GOBIN="${GOBIN}" go install github.com/securego/gosec/v2/cmd/gosec@v2.22.2
    fi

.install-govulncheck: &install-govulncheck
  - mkdir -p "${GOBIN}"
  - |
    if ! command -v govulncheck >/dev/null 2>&1; then
      GOBIN="${GOBIN}" go install golang.org/x/vuln/cmd/govulncheck@latest
    fi

lint:
  stage: lint
  script:
    - *install-golangci-lint
    - golangci-lint run ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - shell

test:
  stage: test
  script:
    - CGO_ENABLED=1 go test -v -race -count=1 -coverprofile=coverage.out ./...
    - |
      COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | sed 's/%//')
      if [ -z "$COVERAGE" ]; then echo "ERROR: could not parse coverage from coverage.out"; exit 1; fi
      echo "Coverage: ${COVERAGE}%"
      awk -v coverage="$COVERAGE" 'BEGIN { if (coverage + 0 < 40) exit 1 }' || {
        echo "Coverage ${COVERAGE}% is below 40% threshold"
        exit 1
      }
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - services/keycenter/coverage.out
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - shell

gosec:
  stage: security
  script:
    - *install-gosec
    - gosec ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - shell

govulncheck:
  stage: security
  script:
    - *install-govulncheck
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - shell

build:
  stage: build
  script:
    - CGO_ENABLED=1 go build -o veilkey-keycenter ./cmd/
  artifacts:
    paths:
      - services/keycenter/veilkey-keycenter
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - shell

package:
  stage: package
  needs:
    - job: build
      artifacts: true
  script:
    - PKG_NAME="veilkey-keycenter"
    - PKG_VERSION="${CI_COMMIT_SHA}"
    - mkdir -p dist/package
    - install -m 755 veilkey-keycenter dist/package/veilkey-keycenter
    - install -m 644 README.md dist/package/README.md
    - mkdir -p dist/package/scripts
    - install -m 755 scripts/deploy-lxc.sh dist/package/scripts/deploy-lxc.sh
    - install -m 755 scripts/sync-agent-inventory.sh dist/package/scripts/sync-agent-inventory.sh
    - tar -C dist/package -czf "dist/${PKG_NAME}.tar.gz" .
    - sha256sum "dist/${PKG_NAME}.tar.gz" | awk '{print $1}' > "dist/${PKG_NAME}.tar.gz.sha256"
    - echo "SHA256 checksum:" && cat "dist/${PKG_NAME}.tar.gz.sha256"
    - |
      PACKAGE_API_URL="${VEILKEY_GITLAB_API_URL:-${CI_API_V4_URL}}"
      PACKAGE_TOKEN="${VEILKEY_GITLAB_PACKAGE_PAT:-}"
      PACKAGE_HEADER_NAME="JOB-TOKEN"
      PACKAGE_HEADER_VALUE="${CI_JOB_TOKEN}"
      if [[ -n "${PACKAGE_TOKEN}" ]]; then
        PACKAGE_HEADER_NAME="PRIVATE-TOKEN"
        PACKAGE_HEADER_VALUE="${PACKAGE_TOKEN}"
      fi
      curl --fail --header "${PACKAGE_HEADER_NAME}: ${PACKAGE_HEADER_VALUE}" \
        --upload-file "dist/${PKG_NAME}.tar.gz" \
        "${PACKAGE_API_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_NAME}/${PKG_VERSION}/${PKG_NAME}.tar.gz"
      curl --fail --header "${PACKAGE_HEADER_NAME}: ${PACKAGE_HEADER_VALUE}" \
        --upload-file "dist/${PKG_NAME}.tar.gz.sha256" \
        "${PACKAGE_API_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_NAME}/${PKG_VERSION}/${PKG_NAME}.tar.gz.sha256"
  artifacts:
    paths:
      - services/keycenter/dist/veilkey-keycenter.tar.gz
      - services/keycenter/dist/veilkey-keycenter.tar.gz.sha256
  tags:
    - shell
  rules:
    - if: $UPSTREAM_SOURCE == "push"
    - if: $UPSTREAM_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"

docker:
  stage: docker
  before_script:
    - cd services/keycenter
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - DOCKER_BUILDKIT=0 docker build
      --build-arg DOCKER_MIRROR="$DOCKER_MIRROR"
      -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      -t "$CI_REGISTRY_IMAGE:main"
      -t "$CI_REGISTRY_IMAGE:latest"
      .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:main"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - shell

deploy:
  stage: deploy
  before_script:
    - cd services/keycenter
  script:
    - bash scripts/deploy-lxc.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - proxmox-host


mr-guard:
  stage: verify
  script:
    - bash tests/test_mr_guard.sh
    - bash tests/test_deploy_lxc.sh
    - bash scripts/check-mr-guard.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - shell
