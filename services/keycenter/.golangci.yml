version: "2"

linters:
  enable:
    - errcheck        # 무시된 에러 탐지
    - govet           # go vet 검사
    - staticcheck     # 버그/성능/스타일 종합
    - unused          # 미사용 코드
    - ineffassign     # 무효 할당
    - gocritic        # 코드 개선점
    - bodyclose       # HTTP response body 미닫힘
    - nilerr          # err != nil 인데 nil 반환
    - errname         # 에러 타입 네이밍 규칙

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        # defer cleanup — 에러 발생해도 처리 불가능한 리소스 정리
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.Row).Scan
        - (*os.File).Close
        - (io.Closer).Close

        # HTTP response body — defer close 패턴
        - (*net/http.Response).Body.Close

        # HTTP response writer — 클라이언트 끊김 시 처리 불가
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - fmt.Fprintf
        - fmt.Fprintln

        # 테스트 유틸 — 테스트 실패로 충분
        - encoding/json.Unmarshal
        - (*bytes.Buffer).ReadFrom
        - os.Setenv
        - os.Unsetenv
        - crypto/rand.Read

        # DB 조작 — fire-and-forget 정리 쿼리
        - (*database/sql.DB).Exec

        # io 유틸 — discard 패턴
        - io.Copy

        # 프로젝트 내부 — defer cleanup, 테스트 setup
        - (*veilkey-keycenter/internal/db.DB).Close
        - (*veilkey-keycenter/internal/db.DB).CreateKey
        - (*veilkey-keycenter/internal/db.DB).RegisterChild
        - (*veilkey-keycenter/internal/api.Server).Unlock

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - exitAfterDefer    # CLI init 함수에서 log.Fatalf + defer Close 패턴 허용
        - hugeParam
        - rangeValCopy
        - ifElseChain
        - offBy1
        - singleCaseSwitch

