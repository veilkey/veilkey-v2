<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilKey KeyCenter - Operations Console (Variation 9)</title>
    <style>
        :root {
            --cobalt: #0d3b8e;
            --cobalt-soft: #f4f7fb;
            --cobalt-light: #ebf1fa;
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --surface-soft: #f1f5f9;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #334155;
            --text-light: #64748b;
            --text-faint: #94a3b8;
            --success-bg: #dcfce7;
            --success-text: #15803d;
            --warn-bg: #fef3c7;
            --warn-text: #b45309;
            --danger-bg: #fee2e2;
            --danger-text: #b91c1c;
            --local-bg: #e0f2fe;
            --local-text: #0369a1;
            --temp-bg: #fef3c7;
            --temp-text: #b45309;
            --external-bg: #f3e8ff;
            --external-text: #7e22ce;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            --radius: 10px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: var(--font-family);
            font-size: 10px;
            background: var(--surface-muted);
            color: var(--text-main);
            overflow: hidden;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
            border: 0;
            background: transparent;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 16px;
            flex-shrink: 0;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--cobalt);
            font-size: 11px;
            min-width: 220px;
        }

        .topbar-brand-mark {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            background: var(--cobalt);
            color: var(--surface);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
        }

        .topbar-center {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .global-search {
            position: relative;
            width: min(420px, 100%);
        }

        .global-search input {
            width: 100%;
            height: 28px;
            border: 1px solid var(--border);
            background: var(--surface-muted);
            border-radius: 8px;
            padding: 0 12px;
            color: var(--text-main);
        }

        .topbar-status {
            display: none;
        }

        .shell {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .sidebar {
            width: 190px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 14px 0;
            gap: 4px;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 0 10px;
        }

        .sidebar-label {
            padding: 0 8px 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            font-size: 8px;
            font-weight: 700;
        }

        .nav-list,
        .mini-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item,
        .mini-item {
            width: 100%;
            text-align: left;
            border-radius: 8px;
            padding: 7px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: var(--text-muted);
        }

        .nav-item.active,
        .mini-item.active {
            background: var(--cobalt-soft);
            color: var(--cobalt);
            font-weight: 700;
        }

        .nav-item:hover,
        .mini-item:hover {
            background: var(--surface-muted);
        }

        .nav-item-main,
        .mini-item-main {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .nav-badge,
        .mini-badge,
        .pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--surface-soft);
            color: var(--text-muted);
            font-size: 8px;
            white-space: nowrap;
        }

        .pill.kind-vk {
            background: #14324a;
            color: #8fd3ff;
            border: 1px solid #28597d;
        }

        .pill.kind-ve {
            background: #153625;
            color: #9fe0b4;
            border: 1px solid #316448;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .workspace-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .workspace-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .workspace-title h1 {
            font-size: 16px;
            line-height: 1.1;
            font-weight: 700;
        }

        .workspace-title p {
            color: var(--text-light);
            margin-top: 4px;
        }

        .tabbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-muted);
            color: var(--text-muted);
            font-weight: 600;
        }

        .tab.active {
            color: var(--cobalt);
            background: var(--cobalt-soft);
            border-color: #d6e4f8;
        }

        .workspace-body {
            flex: 1;
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr) 300px;
            gap: 14px;
            padding: 14px;
            min-height: 0;
        }

        .workspace-body.is-two-pane {
            grid-template-columns: minmax(0, 1.2fr) 340px;
        }

        .pane {
            min-height: 0;
            overflow: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .pane-header {
            padding: 11px 11px 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 2;
        }

        .pane-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .pane-title strong {
            font-size: 11px;
        }

        .pane-content {
            padding: 11px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .pane-content:empty {
            display: none;
            padding: 0;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: var(--surface);
        }

        .card-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .label {
            font-size: 8px;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .value {
            font-size: 10px;
            color: var(--text-main);
            word-break: break-word;
        }

        .muted {
            color: var(--text-light);
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .field,
        .select,
        .textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-muted);
            color: var(--text-main);
            padding: 7px 8px;
        }

        .textarea {
            min-height: 120px;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            line-height: 1.45;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .context-summary {
            min-width: 180px;
            max-width: 220px;
        }

        .context-search {
            width: min(280px, 100%);
            min-width: 180px;
        }

        .segmented {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 2px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface-muted);
        }

        .segmented-label {
            font-size: 8px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-faint);
            font-weight: 700;
        }

        .segmented .btn {
            min-width: 44px;
            border-color: transparent;
            background: transparent;
            color: var(--text-muted);
        }

        .segmented .btn.btn-primary {
            background: var(--surface);
            border-color: var(--border);
            color: var(--cobalt);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
        }

        .btn {
            padding: 6px 9px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-main);
            font-weight: 600;
        }

        .btn-primary {
            background: var(--cobalt);
            border-color: var(--cobalt);
            color: var(--surface);
        }

        .btn-soft {
            background: var(--surface-muted);
        }

        .btn-danger {
            background: var(--danger-bg);
            border-color: #fecaca;
            color: var(--danger-text);
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }

        .metric {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: var(--surface);
        }

        .metric .label {
            display: block;
            margin-bottom: 8px;
        }

        .metric strong {
            font-size: 14px;
            line-height: 1;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th,
        td {
            padding: 8px 9px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }

        th {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            background: var(--surface-muted);
        }

        tr:last-child td {
            border-bottom: 0;
        }

        tr.is-selected {
            background: var(--cobalt-soft);
        }

        tr.is-clickable {
            cursor: pointer;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .status-pill.scope-local {
            background: var(--local-bg);
            color: var(--local-text);
        }

        .status-pill.scope-temp {
            background: var(--temp-bg);
            color: var(--temp-text);
        }

        .status-pill.scope-external {
            background: var(--external-bg);
            color: var(--external-text);
        }

        .status-pill.ok,
        .status-pill.active {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-pill.rotation_required,
        .status-pill.rebind_required,
        .status-pill.pending {
            background: var(--warn-bg);
            color: var(--warn-text);
        }

        .status-pill.blocked,
        .status-pill.revoked,
        .status-pill.error {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        .inline-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .kv {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message {
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .message.ok {
            background: var(--success-bg);
            border-color: #bbf7d0;
            color: var(--success-text);
        }

        .message.error {
            background: var(--danger-bg);
            border-color: #fecaca;
            color: var(--danger-text);
        }

        .message.warn {
            background: var(--warn-bg);
            border-color: #fde68a;
            color: var(--warn-text);
        }

        .empty {
            border: 1px dashed var(--border-strong);
            border-radius: 3px;
            padding: 5px;
            color: var(--text-light);
            background: var(--surface-muted);
        }

        .code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background: var(--border);
        }

        @media (max-width: 1420px) {
            .workspace-body {
                grid-template-columns: 240px minmax(0, 1fr) 320px;
            }
        }

        @media (max-width: 1200px) {
            .workspace-body {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 200px;
            }
        }
    </style>
</head>
<body>
<div class="app" id="app" data-app="keycenter-admin-shell">
    <header class="topbar">
        <div class="topbar-brand">
            <span class="topbar-brand-mark">VK</span>
            <span>VeilKey KeyCenter</span>
        </div>
        <div class="topbar-center">
            <div class="global-search">
                <input id="global-search" type="search" placeholder="현재 화면 검색" :value="state.globalQuery" @input="onGlobalSearchInput">
            </div>
        </div>
        <div class="topbar-status" id="topbar-status" v-html="state.ui.topbarStatusHTML"></div>
    </header>
    <div class="shell">
        <aside class="sidebar" id="sidebar" v-html="state.ui.sidebarHTML"></aside>
        <aside class="sidebar" id="secondary-sidebar" v-show="state.activePage === 'vaults' || !state.ui.secondarySidebarHidden">
            <template v-if="state.activePage === 'vaults'">
                <div class="sidebar-section">
                    <div class="sidebar-label">전체</div>
                    <div class="nav-list">
                        <a
                            :href="routePath('vaults', '전체 볼트')"
                            class="nav-item"
                            :class="{ active: activeTab() === '전체 볼트' }"
                            data-action="set-tab"
                            data-tab="전체 볼트"
                        >
                            <span class="nav-item-main"><span>전체 볼트</span></span>
                        </a>
                        <a
                            :href="routePath('vaults', 'Host Vault')"
                            class="nav-item"
                            :class="{ active: activeTab() === 'Host Vault' }"
                            data-action="set-tab"
                            data-tab="Host Vault"
                        >
                            <span class="nav-item-main"><span>호스트 볼트</span></span>
                        </a>
                    </div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-label">로컬 볼트</div>
                    <div class="nav-list">
                        <a
                            v-for="vault in filteredVaults()"
                            :key="vault.vault_runtime_hash"
                            :href="'/vaults/local/' + encodeURIComponent(vault.vault_runtime_hash)"
                            class="nav-item"
                            :class="{ active: activeTab() !== 'Host Vault' && state.selectedVault && vault.vault_runtime_hash === state.selectedVault.vault_runtime_hash }"
                            data-action="select-vault"
                            :data-key="vault.vault_runtime_hash"
                        >
                            <span class="nav-item-main">
                                <span>{{ vault.display_name || vault.vault_name || vault.vault_runtime_hash }}</span>
                            </span>
                            <span class="status-pill" :class="statusClass(vault.status || 'active')">{{ vault.status || 'active' }}</span>
                        </a>
                        <div v-if="!filteredVaults().length" class="empty">표시할 볼트가 없습니다.</div>
                    </div>
                </div>
            </template>
            <template v-else-if="state.activePage === 'functions'">
                <div class="sidebar-section">
                    <div class="sidebar-label">함수 목록</div>
                    <div class="nav-list">
                        <a
                            v-for="fn in filteredFunctions()"
                            :key="fn.name"
                            :href="routePath('functions', activeTab())"
                            class="nav-item"
                            :class="{ active: state.selectedFunction && fn.name === state.selectedFunction.name }"
                            data-action="select-function"
                            :data-key="fn.name"
                        >
                            <span class="nav-item-main">
                                <span>{{ fn.name }}</span>
                            </span>
                            <span class="status-pill" :class="statusClass(fn.status || 'active')">{{ fn.status || 'active' }}</span>
                        </a>
                        <div v-if="!filteredFunctions().length" class="empty">등록된 글로벌 함수가 없습니다. `/api/functions/global` 결과가 0건입니다.</div>
                    </div>
                </div>
            </template>
            <template v-else-if="state.activePage === 'audit'">
                <div class="sidebar-section">
                    <div class="sidebar-label">감사 볼트</div>
                    <div class="nav-list">
                        <a
                            v-for="vault in filteredVaults()"
                            :key="vault.vault_runtime_hash"
                            :href="routePath('audit', '감사 로그')"
                            class="nav-item"
                            :class="{ active: state.auditVault === vault.vault_runtime_hash }"
                            data-action="audit-page-select-vault"
                            :data-key="vault.vault_runtime_hash"
                        >
                            <span class="nav-item-main">
                                <span>{{ vault.display_name || vault.vault_name || vault.vault_runtime_hash }}</span>
                            </span>
                            <span class="status-pill" :class="statusClass(vault.status || 'active')">{{ vault.status || 'active' }}</span>
                        </a>
                        <div v-if="!filteredVaults().length" class="empty">표시할 볼트가 없습니다.</div>
                    </div>
                </div>
            </template>
            <template v-else-if="state.activePage === 'settings'">
                <div class="sidebar-section">
                    <div class="sidebar-label">설정</div>
                    <div class="nav-list">
                        <a
                            v-for="tabName in pageConfig.settings.tabs"
                            :key="tabName"
                            :href="routePath('settings', tabName)"
                            class="nav-item"
                            :class="{ active: activeTab() === tabName }"
                            data-action="set-tab"
                            :data-tab="tabName"
                        >
                            <span class="nav-item-main">
                                <span>{{ tabName }}</span>
                            </span>
                        </a>
                    </div>
                </div>
            </template>
            <template v-else>
                <div v-html="state.ui.secondarySidebarHTML"></div>
            </template>
        </aside>
        <section class="workspace">
            <header class="workspace-header" id="workspace-header" v-html="state.ui.headerHTML"></header>
            <div class="workspace-body" :class="{ 'is-two-pane': state.activePage === 'vaults' ? true : state.ui.twoPane }">
                <template v-if="state.activePage === 'vaults'">
                    <section class="pane" id="center-pane">
                        <div class="pane-header">
                            <div class="pane-title"><strong>{{ vaultCenterTitle() }}</strong></div>
                            <template v-if="activeTab() === '전체 볼트'">
                                <div class="toolbar">
                                    <div class="toolbar-group">
                                        <input class="field context-search" id="vault-search" type="search" placeholder="볼트 검색" :value="state.globalQuery">
                                    </div>
                                    <span class="pill">{{ allVaultRows().length }}개</span>
                                    <button class="btn btn-soft" data-action="refresh-vaults">새로고침</button>
                                </div>
                            </template>
                            <template v-else>
                                <div class="toolbar">
                                    <div class="toolbar-group">
                                        <div class="toolbar-group">
                                            <span class="segmented-label">표시 대상</span>
                                            <div class="segmented" role="tablist" aria-label="표시 대상">
                                                <button class="btn" :class="state.vaultItemKind === 'ALL' ? 'btn-primary' : 'btn-soft'" data-action="set-vault-kind" data-kind="ALL" :aria-pressed="state.vaultItemKind === 'ALL' ? 'true' : 'false'">전체</button>
                                                <button class="btn" :class="state.vaultItemKind === 'VE' ? 'btn-primary' : 'btn-soft'" data-action="set-vault-kind" data-kind="VE" :aria-pressed="state.vaultItemKind === 'VE' ? 'true' : 'false'">환경값</button>
                                                <button class="btn" :class="state.vaultItemKind === 'VK' ? 'btn-primary' : 'btn-soft'" data-action="set-vault-kind" data-kind="VK" :aria-pressed="state.vaultItemKind === 'VK' ? 'true' : 'false'">키</button>
                                            </div>
                                        </div>
                                        <input class="field context-search" id="key-search" type="search" :placeholder="activeTab() === 'Host Vault' ? '호스트 볼트 안에서 검색' : '현재 볼트 안에서 검색'" :value="state.globalQuery">
                                    </div>
                                    <span class="pill">{{ vaultVisibleRows().length }}개 항목</span>

                                <template v-else>
                                    <div v-if="state.selectedFunction" class="card">
                                        <div class="card-title">요약</div>

                                            <div class="kv"><span class="label">함수</span><span class="value">{{ state.selectedFunction.name || '-' }}</span></div>

                    <template v-else>
                        <template v-if="state.activePage === 'audit'">
                            <section class="pane" id="center-pane">
                                <div class="pane-header">
                                    <div class="pane-title"><strong>감사 로그</strong></div>

                            <section class="pane" id="right-pane">
                                <div class="pane-header">
                                    <div class="pane-title"><strong>이벤트 상세</strong></div>
                                </div>
                                <div class="pane-content">
                                    <div v-if="state.auditRows.length" class="card">
                                        <div class="card-title">Latest Event</div>
                                        <pre class="code">{{ prettyJSON(state.auditRows[0]) }}</pre>
                                    </div>
                                    <div v-else class="empty">볼트를 선택하면 상세가 표시됩니다.</div>

                        </template>
                        <template v-else>
                            <template v-if="state.activePage === 'settings'">
                                <section class="pane" id="center-pane">
                                    <div class="pane-header">
                                        <div class="pane-title"><strong>{{ settingsCenterTitle() }}</strong></div>
                                    </div>
                                    <div class="pane-content">
                                        <template v-if="!state.uiConfig">
                                            <div class="empty">Loading UI config.</div>
                                        </template>
                                        <template v-else-if="activeTab() === '관리자'">
                                            <div class="card">
                                                <div class="card-title">System Update</div>
                                                <div class="stack">
                                                    <div class="value">Current deployed version and update target are managed here.</div>
                                                    <div class="value">Update execution only runs when the server has a configured update script.</div>
                                                </div>
                                            </div>
                                            <div class="card" v-if="state.systemUpdate">
                                                <div class="card-title">Update Status</div>
                                                <div class="inline-grid">
                                                    <div class="kv"><span class="label">Current Version</span><span class="value">{{ state.systemUpdate.current_version || '-' }}</span></div>
                                                    <div class="kv"><span class="label">Target Version</span><span class="value">{{ state.systemUpdate.target_version || '-' }}</span></div>
                                                    <div class="kv"><span class="label">Release Channel</span><span class="value">{{ state.systemUpdate.release_channel || '-' }}</span></div>
                                                    <div class="kv"><span class="label">Update Available</span><span class="value">{{ state.systemUpdate.update_available ? 'yes' : 'no' }}</span></div>
                                                    <div class="kv"><span class="label">Update Enabled</span><span class="value">{{ state.systemUpdate.update_enabled ? 'yes' : 'no' }}</span></div>
                                                    <div class="kv"><span class="label">Last Status</span><span class="value">{{ (state.systemUpdate.state && state.systemUpdate.state.status) || '-' }}</span></div>
                                                </div>
                                            </div>
                                        </template>
                                        <template v-else>
                                            <div class="card">
                                                <div class="card-title">Interface</div>
                                                <div class="inline-grid">
                                                    <div class="kv"><span class="label">Locale</span><span class="value">{{ state.uiConfig.locale || '-' }}</span></div>
                                                    <div class="kv"><span class="label">Default Email</span><span class="value">{{ state.uiConfig.default_email || '-' }}</span></div>
                                                </div>

                                        </template>

                                <section class="pane" id="right-pane">
                                    <div class="pane-header">
                                        <div class="pane-title"><strong>{{ settingsRightPaneTitle() }}</strong></div>

                                        <template v-if="!state.uiConfig">
                                            <div class="empty">Loading.</div>
                                        </template>
                                        <template v-else-if="activeTab() === '관리자'">
                                            <div class="card">
                                                <div class="card-title">Update Control</div>
                                                <div class="inline-grid">
                                                    <div class="kv"><span class="label">Configured Script</span><span class="value">{{ (state.systemUpdate && state.systemUpdate.script_path) || 'not configured' }}</span></div>
                                                    <div class="kv"><span class="label">Last Error</span><span class="value">{{ (state.systemUpdate && state.systemUpdate.state && state.systemUpdate.state.last_error) || '-' }}</span></div>
                                                </div>

                                            <form class="stack" data-form="save-admin-update-settings">
                                                <div class="card">
                                                    <div class="card-title">Update Settings</div>
                                                    <div class="stack">
                                                        <div class="kv"><span class="label">Target Version</span><input class="field" name="target_version" :value="state.uiConfig.target_version || ''" placeholder="0.2.0"></div>
                                                        <div class="kv">
                                                            <span class="label">Release Channel</span>
                                                            <select class="select" name="release_channel">
                                                                <option value="stable" :selected="(state.uiConfig.release_channel || 'stable') === 'stable'">stable</option>
                                                                <option value="candidate" :selected="(state.uiConfig.release_channel || 'stable') === 'candidate'">candidate</option>
                                                                <option value="nightly" :selected="(state.uiConfig.release_channel || 'stable') === 'nightly'">nightly</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="inline-actions">
                                                    <button class="btn btn-primary" type="submit">Save Update Settings</button>
                                                    <button class="btn" type="button" data-action="run-system-update">Run Update</button>
                                                </div>
                                            </form>
                                        </template>
                                        <template v-else>
                                            <form class="stack" data-form="save-settings">
                                                <div class="card">
                                                    <div class="card-title">UI Config</div>
                                                    <div class="stack">
                                                        <div class="kv">
                                                            <span class="label">Locale</span>
                                                            <select class="select" name="locale">
                                                                <option value="ko" :selected="(state.uiConfig.locale || 'ko') === 'ko'">ko</option>
                                                                <option value="en" :selected="(state.uiConfig.locale || 'ko') === 'en'">en</option>
                                                            </select>
                                                        </div>
                                                        <div class="kv"><span class="label">Default Email</span><input class="field" name="default_email" :value="state.uiConfig.default_email || ''"></div>
                                                    </div>
                                                </div>
                                                <button class="btn btn-primary" type="submit">Save Settings</button>
                                            </form>
                                        </template>
                                    </div>
                                </section>
                            </template>
                            <template v-else>
                                <section class="pane" id="left-pane" v-show="state.ui.leftVisible" v-html="state.ui.leftHTML"></section>
                                <section class="pane" id="center-pane" v-html="state.ui.centerHTML"></section>
                                <section class="pane" id="right-pane" v-html="state.ui.rightHTML"></section>
                            </template>
                        </template>
                    </template>
                </template>
            </div>
        </section>
    </div>
</div>
<script src="/assets/vue.global.prod.js"></script>
<script>
(() => {
    const { createApp, reactive } = window.Vue;
    const pageConfig = {
        vaults: { label: '볼트', tabs: ['전체 볼트', 'Host Vault', '키 / 환경값'] },
        functions: { label: '함수', tabs: ['함수 목록', '연결 관리', '영향도', '실행'] },
        audit: { label: '감사', tabs: ['감사 로그'] },
        settings: { label: '설정', tabs: ['UI', '관리자'] }
    };

    const state = reactive({
        activePage: 'vaults',
        activeTabByPage: {
            vaults: '전체 볼트',
            functions: '함수 목록',
            audit: '감사 로그',
            settings: 'UI'
        },
        message: null,
        status: null,
        uiConfig: null,
        systemUpdate: null,
        globalQuery: '',
        vaults: [],
        selectedVault: null,
        vaultDetail: null,
        vaultKeys: [],
        keyDetail: null,
        selectedKey: null,
        keySummary: null,
        keyBindings: [],
        vaultAudit: [],
        keyAudit: [],
        configMatches: [],
        configSearchKey: '',
        selectedConfigVault: null,
        selectedConfigKey: null,
        configVaultItems: [],
        configDetail: null,
        configRelations: [],
        vaultItemKind: 'ALL',
        selectedVaultItemKind: 'VK',
        vaultItemSyncStatus: {},
        routeSelectedVaultHash: null,
        hostVaultKeys: [],
        hostVaultConfigs: [],
        hostSelectedKey: null,
        hostSelectedConfigKey: null,
        hostSelectedItemKind: 'VK',
        hostKeyDetail: null,
        hostConfigDetail: null,
        revealValue: false,
        functions: [],
        selectedFunction: null,
        functionDetail: null,
        functionBindings: [],
        functionSummary: null,
        functionImpact: null,
        functionRunResult: null,
        auditVault: null,
        auditKey: null,
        auditRows: [],
        trackedRefAudit: null,
        adminAuditRows: [],
        busy: {},
        ui: {
            sidebarHTML: '',
            secondarySidebarHTML: '',
            secondarySidebarHidden: false,
            headerHTML: '',
            topbarStatusHTML: '',
            leftHTML: '',
            leftVisible: true,
            centerHTML: '',
            rightHTML: '',
            twoPane: false
        }
    });

    const routeEntries = [
        { page: 'vaults', tab: '전체 볼트', path: '/vaults/all' },
        { page: 'vaults', tab: 'Host Vault', path: '/vaults/host' },
        { page: 'functions', tab: '함수 목록', path: '/functions/list' },
        { page: 'functions', tab: '연결 관리', path: '/functions/bindings' },
        { page: 'functions', tab: '영향도', path: '/functions/impact' },
        { page: 'functions', tab: '실행', path: '/functions/run' },
        { page: 'audit', tab: '감사 로그', path: '/audit' },
        { page: 'settings', tab: 'UI', path: '/settings/ui' },
        { page: 'settings', tab: '관리자', path: '/settings/admin' }
    ];

    const routeByPath = Object.fromEntries(routeEntries.map((entry) => [entry.path, entry]));

    function escapeHTML(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatJSON(value) {
        return JSON.stringify(value, null, 2);
    }

    function isSelected(value, current) {
        return value === current ? ' is-selected' : '';
    }

    function apiURL(path, query) {
        const url = new URL(path, window.location.origin);
        if (query) {
            Object.entries(query).forEach(([key, value]) => {
                if (value !== null && value !== undefined && value !== '') {
                    url.searchParams.set(key, value);
                }
            });
        }
        return url.toString();
    }

    async function request(path, options = {}) {
        const resp = await fetch(apiURL(path), {
            headers: {
                'Content-Type': 'application/json',
                ...(options.headers || {})
            },
            ...options
        });
        const text = await resp.text();
        let data = null;
        try {
            data = text ? JSON.parse(text) : null;
        } catch (err) {
            data = { raw: text };
        }
        if (!resp.ok) {
            const message = data && data.error ? data.error : (text || ('HTTP ' + resp.status));
            throw new Error(message);
        }
        return data;
    }

    function setBusy(key, value) {
        state.busy[key] = value;
        render();
    }

    function setMessage(kind, text) {
        state.message = text ? { kind, text } : null;
        renderHeader();
    }

    function scopeClass(scope) {
        const normalized = String(scope || '').toLowerCase();
        if (normalized === 'external') return 'scope-external';
        if (normalized === 'temp') return 'scope-temp';
        return 'scope-local';
    }

    function statusClass(status) {
        return String(status || 'ok').replace(/\s+/g, '_').toLowerCase();
    }

    function renderStatusPill(label, className) {
        return '<span class="status-pill ' + escapeHTML(className) + '">' + escapeHTML(label) + '</span>';
    }

    function activeTab() {
        return state.activeTabByPage[state.activePage];
    }

    function routePath(page, tab) {
        if (page === 'vaults' && tab === '키 / 환경값') {
            const vaultHash = state.selectedVault?.vault_runtime_hash || state.routeSelectedVaultHash;
            return vaultHash ? `/vaults/local/${encodeURIComponent(vaultHash)}` : '/vaults/local';
        }
        const entry = routeEntries.find((item) => item.page === page && item.tab === tab);
        return entry ? entry.path : '/';
    }

    function applyRoute(locationLike) {
        const pathname = typeof locationLike === 'string' ? locationLike : locationLike.pathname;
        const search = typeof locationLike === 'string' ? '' : locationLike.search;
        const params = new URLSearchParams(search || '');
        const normalized = pathname !== '/' && pathname.endsWith('/') ? pathname.slice(0, -1) : pathname;
        const localVaultMatch = normalized.match(/^\/vaults\/local(?:\/([^/]+))?$/);
        if (localVaultMatch) {
            state.activePage = 'vaults';
            state.routeSelectedVaultHash = localVaultMatch[1] ? decodeURIComponent(localVaultMatch[1]) : null;
            const tab = params.get('tab') || 'items';
            state.activeTabByPage.vaults = tab === 'functions' ? '함수' : tab === 'bulk-apply' ? '일괄변경' : '키 / 환경값';
            state.bulkApplyView = params.get('view') || 'items';
            state.routeSelectedFunctionName = null;
            return;
        }
        const matched = normalized === '/' ? { page: 'vaults', tab: '전체 볼트' } : routeByPath[normalized];
        if (!matched) return;
        state.activePage = matched.page;
        state.activeTabByPage[matched.page] = matched.tab;
        state.routeSelectedVaultHash = null;
    }

    function syncRoute(replace) {
        const nextPath = routePath(state.activePage, activeTab());
        if (window.location.pathname === nextPath) return;
        const fn = replace ? 'replaceState' : 'pushState';
        window.history[fn]({ page: state.activePage, tab: activeTab() }, '', nextPath);
    }

    function matchesQuery(text) {
        const query = state.globalQuery.trim().toLowerCase();
        if (!query) return true;
        return String(text || '').toLowerCase().includes(query);
    }

    function navCount(page) {
        if (page === 'vaults') return state.vaults.length;
        if (page === 'functions') return state.functions.length;
        if (page === 'audit') return state.trackedRefAudit && state.trackedRefAudit.counts ? state.trackedRefAudit.counts.total_refs : 0;
        if (page === 'settings') return state.uiConfig ? 2 : 0;
        return 0;
    }

    function vaultKindLabel(kind) {
        return kind === 'VE' ? 'ENV' : 'KEY';
    }

    function vaultItemSyncKey(kind, name) {
        return `${kind}:${name}`;
    }

    function emptyVaultSyncStats(total = 0) {
        return {
            total,
            present: 0,
            missing: 0,
            nameValueMatch: 0,
            nameOnlyMatch: 0,
            valueOnlyMatch: 0
        };
    }

    function vaultItemMatchStats(kind, name) {
        const item = state.vaultItemSyncStatus[vaultItemSyncKey(kind, name)];
        if (!item) return null;
        return item;
    }

    function renderPlacementStatus(kind, name) {
        const item = vaultItemMatchStats(kind, name);
        if (!item) return '<span class="muted">확인중</span>';
        if (item.missing === 0) {
            return renderStatusPill(`${item.present}/${item.total} 배치`, 'active');
        }
        return renderStatusPill(`${item.present} 배치 / ${item.missing} 미존재`, 'pending');
    }

    function renderNameValueStatus(kind, name) {
        const item = vaultItemMatchStats(kind, name);
        if (!item) return '<span class="muted">확인중</span>';
        const denominator = item.present || 1;
        const className = item.present > 0 && item.nameValueMatch === item.present ? 'active' : 'pending';
        return renderStatusPill(`${item.nameValueMatch}/${denominator} 일치`, className);
    }

    function renderNameOnlyStatus(kind, name) {
        const item = vaultItemMatchStats(kind, name);
        if (!item) return '<span class="muted">확인중</span>';
        const className = item.nameOnlyMatch > 0 ? 'pending' : 'active';
        return renderStatusPill(`${item.nameOnlyMatch} 값다름`, className);
    }

    function renderValueOnlyStatus(kind, name) {
        const item = vaultItemMatchStats(kind, name);
        if (!item) return '<span class="muted">확인중</span>';
        const className = item.valueOnlyMatch > 0 ? 'pending' : 'active';
        return renderStatusPill(`${item.valueOnlyMatch} 중복값`, className);
    }

    function vaultSyncStatus(kind, name) {
        const item = vaultItemMatchStats(kind, name);
        if (!item) return { loading: true };
        return {
            loading: false,
            placementLabel: item.missing === 0 ? `${item.present}/${item.total} 배치` : `${item.present} 배치 / ${item.missing} 미존재`,
            placementClassName: item.missing === 0 ? 'active' : 'pending',
            nameValueLabel: `${item.nameValueMatch}/${item.present || 1} 일치`,
            nameValueClassName: item.present > 0 && item.nameValueMatch === item.present ? 'active' : 'pending',
            nameOnlyLabel: `${item.nameOnlyMatch} 값다름`,
            nameOnlyClassName: item.nameOnlyMatch > 0 ? 'pending' : 'active',
            valueOnlyLabel: `${item.valueOnlyMatch} 중복값`,
            valueOnlyClassName: item.valueOnlyMatch > 0 ? 'pending' : 'active'
        };
    }

    function vaultTargetOptions(includeHost = true) {
        const options = [];
        if (includeHost) options.push({ value: 'host', label: 'Host Vault' });
        (state.vaults || []).forEach((vault) => {
            options.push({
                value: vault.vault_runtime_hash,
                label: vault.display_name || vault.vault_name || vault.label || vault.vault_runtime_hash
            });
        });
        return options;
    }

    function renderTargetOptions(options, selected) {
        return options.map((option) => `<option value="${escapeHTML(option.value)}"${option.value === selected ? ' selected' : ''}>${escapeHTML(option.label)}</option>`).join('');
    }

    function renderConfigRelations() {
        if (!state.configRelations.length) {
            return '<div class="empty">같은 키의 LOCAL / EXTERNAL 관계가 아직 없습니다.</div>';
        }
        const sections = ['LOCAL', 'EXTERNAL', 'TEMP'].map((scope) => {
            const rows = state.configRelations.filter((item) => String(item.scope || '').toUpperCase() === scope);
            if (!rows.length) return '';
            return `
                <div class="stack">
                    <div class="card-title">${scope}</div>
                    ${rows.map((item) => `<div class="value">${escapeHTML(item.vault_name || item.vault_runtime_hash || '-')} · ${escapeHTML(item.value || '-')}</div>`).join('')}
                </div>
            `;
        }).filter(Boolean).join('');
        return sections || '<div class="empty">같은 키의 LOCAL / EXTERNAL 관계가 아직 없습니다.</div>';
    }

    function configRelationsByScope() {
        return ['LOCAL', 'EXTERNAL', 'TEMP'].map((scope) => ({
            scope,
            rows: state.configRelations.filter((item) => String(item.scope || '').toUpperCase() === scope)
        })).filter((section) => section.rows.length);
    }

    function renderSidebar() {
        const sections = [
            { page: 'vaults', label: '볼트' },
            { page: 'functions', label: '함수' },
            { page: 'audit', label: '감사' },
            { page: 'settings', label: '설정' }
        ];

        const navItems = sections.map((section) => {
            const active = state.activePage === section.page;
            const currentTab = state.activeTabByPage[section.page] || pageConfig[section.page].tabs[0];
            return `
                <div class="sidebar-section">
                    <div class="nav-list">
                        <a href="${routePath(section.page, currentTab)}" class="nav-item${active ? ' active' : ''}" data-action="set-page" data-page="${section.page}">
                            <span class="nav-item-main">
                                <span>${escapeHTML(section.label)}</span>
                            </span>
                            <span class="nav-badge">${escapeHTML(navCount(section.page))}</span>
                        </a>
                    </div>
                </div>
            `;
        }).join('');

        state.ui.sidebarHTML = navItems;
    }

    function renderHeader() {
        const page = pageConfig[state.activePage];
        const context = pageContextText();
        const message = state.message ? `<div class="message ${escapeHTML(state.message.kind)}">${escapeHTML(state.message.text)}</div>` : '';
        const breadcrumb = `${page.label} / ${activeTab()}`;
        const headerContent = state.activePage === 'vaults' && state.selectedVault ? `
            <div class="workspace-title">
                <div class="segmented-label">현재 볼트</div>
                <h1>${escapeHTML(state.selectedVault.display_name || state.selectedVault.vault_name || '볼트 미선택')}</h1>
                <p>${escapeHTML(state.selectedVault.vault_id || state.selectedVault.vault_runtime_hash || '-')}</p>
            </div>
        ` : `
            <div class="workspace-title">
                <h1>${escapeHTML(breadcrumb)}</h1>
                <p>${escapeHTML(context)}</p>
            </div>
        `;
        state.ui.headerHTML = `
            <div class="workspace-title-row">

    function renderListPane(title, toolbarHTML, bodyHTML) {

    function renderKVGrid(entries) {
        return `<div class="inline-grid">${entries.map(([label, value]) => `
            <div class="kv">
                <span class="label">${escapeHTML(label)}</span>
                <span class="value">${escapeHTML(value)}</span>
            </div>
        `).join('')}</div>`;

    function renderMiniList(items, selectedKey, action, labelBuilder, badgeBuilder) {
        if (!items || !items.length) return '<div class="empty">표시할 항목이 없습니다.</div>';
        return `<div class="mini-list">${items.map((item) => {
            const key = typeof selectedKey === 'function' ? selectedKey(item) : item[selectedKey];
            return `
                <button class="mini-item${action.selected(item) ? ' active' : ''}" data-action="${escapeHTML(action.name)}" data-key="${escapeHTML(key)}">
                    <span class="mini-item-main">${labelBuilder(item)}</span>
                    ${badgeBuilder ? badgeBuilder(item) : ''}
                </button>
            `;
        }).join('')}</div>`;
    }

    function renderTable(columns, rows, rowClassFn, rowAttrsFn) {
        if (!rows.length) return '<div class="empty">표시할 행이 없습니다.</div>';
        return `
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>${columns.map((column) => `<th>${escapeHTML(column.label)}</th>`).join('')}</tr>
                    </thead>
                    <tbody>
                        ${rows.map((row) => `
                            <tr class="${escapeHTML(rowClassFn ? rowClassFn(row) : '')}" ${rowAttrsFn ? rowAttrsFn(row) : ''}>
                                ${columns.map((column) => `<td>${column.render(row)}</td>`).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function selectedVaultRecord() {
        return state.vaults.find((item) => item.vault_runtime_hash === state.selectedVault?.vault_runtime_hash) || null;

    function selectedKeyRecord() {
        return state.vaultKeys.find((item) => item.name === state.selectedKey?.name) || null;
    }

        if (tab === '전체 볼트') return renderVaultInventory();

        return renderVaultKeys();
    }

        return state.vaults.filter((vault) => matchesQuery(vault.display_name || vault.vault_name || vault.vault_runtime_hash));

                    </div>

                classes.push('is-clickable');

                            <div class="kv"><span class="label">태그 JSON</span><textarea class="textarea" name="tags_json">${escapeHTML(detail.tags_json || '[]')}</textarea></div>

                        <button class="btn btn-primary" type="submit">저장</button>

    function renderHostVault() {
        const keyRows = state.hostVaultKeys.map((item) => ({ ...item, item_kind: 'VK' }));
        const configRows = state.hostVaultConfigs.map((item) => ({ ...item, name: item.key, item_kind: 'VE' }));
        const selectedItemKind = state.vaultItemKind === 'VE'
            ? 'VE'
            : state.vaultItemKind === 'VK'
                ? 'VK'
                : state.hostSelectedItemKind;
        const selectedItemName = selectedItemKind === 'VE' ? state.hostSelectedConfigKey : state.hostSelectedKey?.name;
        const sourceRows = state.vaultItemKind === 'VE'
            ? configRows
            : state.vaultItemKind === 'ALL'
                ? [...keyRows, ...configRows]
                : keyRows;
        const itemRows = sourceRows.filter((row) => matchesQuery(row.name));
        if (selectedItemName && !itemRows.some((row) => row.name === selectedItemName && row.item_kind === selectedItemKind)) {
            const selectedRow = sourceRows.find((row) => row.name === selectedItemName && row.item_kind === selectedItemKind);
            if (selectedRow) itemRows.unshift(selectedRow);
        }
        const isConfigItem = selectedItemKind === 'VE';
        const detail = isConfigItem ? state.hostConfigDetail : state.hostKeyDetail;
        const visibleValue = detail?.value;
        const detailName = isConfigItem ? state.hostSelectedConfigKey : state.hostSelectedKey?.name;
        const canMoveItem = Boolean(detailName || visibleValue || (isConfigItem ? detail?.key : detail?.name));
        const itemIdentifier = (row) => {
            if (row.item_kind === 'VE') return row.value || row.ref || row.key || '-';
            if (row.token) return row.token;
            if (row.ref) return `VK:${row.scope || 'TEMP'}:${row.ref}`;
            return row.name || '-';

        state.ui.leftVisible = false;
        state.ui.twoPane = true;

        renderCenterPane(
            '호스트 볼트',
            `

                    <div class="toolbar-group">

                            <button class="btn ${state.vaultItemKind === 'ALL' ? 'btn-primary' : 'btn-soft'}" data-action="set-vault-kind" data-kind="ALL" aria-pressed="${state.vaultItemKind === 'ALL' ? 'true' : 'false'}">전체</button>
                            <button class="btn ${state.vaultItemKind === 'VE' ? 'btn-primary' : 'btn-soft'}" data-action="set-vault-kind" data-kind="VE" aria-pressed="${state.vaultItemKind === 'VE' ? 'true' : 'false'}">환경값</button>
                            <button class="btn ${state.vaultItemKind === 'VK' ? 'btn-primary' : 'btn-soft'}" data-action="set-vault-kind" data-kind="VK" aria-pressed="${state.vaultItemKind === 'VK' ? 'true' : 'false'}">키</button>
                        </div>
                        <input class="field context-search" id="key-search" type="search" placeholder="호스트 볼트 안에서 검색" value="${escapeHTML(state.globalQuery)}">
                    </div>
                    <span class="pill">${itemRows.length}개 항목</span>
                </div>
            `,
            renderTable([
                { label: '종류', render: (row) => `<span class="pill ${row.item_kind === 'VE' ? 'kind-ve' : 'kind-vk'}">${escapeHTML(vaultKindLabel(row.item_kind))}</span>` },
                { label: '키명', render: (row) => `<span>${escapeHTML(row.name)}</span>` },
                { label: '키값', render: (row) => `<span class="code">${escapeHTML(itemIdentifier(row))}</span>` },
                { label: '범위', render: (row) => renderStatusPill(row.scope || (row.item_kind === 'VE' ? 'LOCAL' : 'TEMP'), scopeClass(row.scope || (row.item_kind === 'VE' ? 'LOCAL' : 'TEMP'))) }
            ], itemRows, (row) => {
                const classes = [];
                if (row.name === selectedItemName && row.item_kind === selectedItemKind) classes.push('is-selected');
                classes.push('is-clickable');
                return classes.join(' ');
            }, (row) => `data-action="select-host-item" data-kind="${escapeHTML(row.item_kind)}" data-key="${escapeHTML(row.name)}"`)
        );

        renderRightPane(isConfigItem ? '환경값 상세' : '키 상세', `
            <div class="stack">
                ${canMoveItem ? `
                    <form class="stack" data-form="${isConfigItem ? 'promote-config' : 'promote-key'}">
                        <div class="card">
                            <div class="card-title">${isConfigItem ? '환경값 이동' : '키 이동'}</div>
                            <div class="stack">
                                <div class="kv"><span class="label">대상 볼트</span><select class="select" name="target_vault">${renderTargetOptions(vaultTargetOptions(true), 'host')}</select></div>
                                <div class="kv"><span class="label">대상 범위</span><select class="select" name="target_scope">${renderOptions(isConfigItem ? ['LOCAL', 'EXTERNAL', 'TEMP'] : ['TEMP', 'LOCAL', 'EXTERNAL'], detail?.scope || (isConfigItem ? 'LOCAL' : 'TEMP'))}</select></div>
                                <div class="kv"><span class="label">보낼 값</span><textarea class="textarea" name="move_value" placeholder="이동할 값을 입력하거나 확인하세요">${escapeHTML(visibleValue || '')}</textarea></div>
                            </div>
                            <div class="muted">${isConfigItem ? 'Host Vault 환경값을 다른 볼트로 보냅니다. LOCAL / EXTERNAL 관계도 여기서 정리합니다.' : 'Host Vault 키를 다른 볼트로 보냅니다.'}</div>
                        </div>
                        <button class="btn btn-soft" type="submit"${visibleValue ? '' : ' disabled'}>${isConfigItem ? '환경값 이동' : '키 이동'}</button>
                    </form>
                ` : ''}
                <form class="stack" data-form="${isConfigItem ? 'save-host-config' : 'save-host-key'}">
                    <div class="card">
                        <div class="card-title">${detailName ? '항목 상세' : (isConfigItem ? '새 환경값' : '새 키')}</div>
                        <div class="stack">
                            <div class="kv"><span class="label">${isConfigItem ? '환경값 이름' : '키 이름'}</span><input class="field" name="${isConfigItem ? 'key' : 'name'}" value="${escapeHTML(detailName || '')}" ${detailName ? 'readonly' : ''}></div>

                                </div>
                                <textarea class="textarea" name="value" placeholder="${detailName ? '새 값을 입력하면 덮어씁니다' : '필수'}">${escapeHTML(state.revealValue ? (visibleValue || '') : '••••••••••••')}</textarea>
                            </div>
                            <div class="kv"><span class="label">범위</span><select class="select" name="scope">${renderOptions(isConfigItem ? ['LOCAL', 'EXTERNAL', 'TEMP'] : ['TEMP', 'LOCAL', 'EXTERNAL'], detail?.scope || (isConfigItem ? 'LOCAL' : 'TEMP'))}</select></div>

                        <button class="btn btn-primary" type="submit">${detailName ? '저장' : '생성'}</button>

                            ['저장소', 'Host Vault']
                        ])}
                    </div>
                `}
            </div>
        `);

    function renderVaultKeys() {
        const keyRows = state.vaultKeys.map((item) => ({ ...item, item_kind: 'VK' }));
        const configRows = state.configVaultItems.map((item) => ({
            ...item,
            name: item.key,
            item_kind: 'VE'
        }));
        const selectedItemKind = state.vaultItemKind === 'VE'
            ? 'VE'
            : state.vaultItemKind === 'VK'
                ? 'VK'
                : state.selectedVaultItemKind;
        const selectedItemName = selectedItemKind === 'VE' ? state.selectedConfigKey : state.selectedKey?.name;
        const sourceRows = state.vaultItemKind === 'VE'
            ? configRows
            : state.vaultItemKind === 'ALL'
                ? [...keyRows, ...configRows]
                : keyRows;
        const itemRows = sourceRows.filter((row) => matchesQuery(row.name));
        if (selectedItemName && !itemRows.some((row) => row.name === selectedItemName && row.item_kind === selectedItemKind)) {
            const selectedRow = sourceRows.find((row) => row.name === selectedItemName && row.item_kind === selectedItemKind);
            if (selectedRow) itemRows.unshift(selectedRow);
        }
        const itemIdentifier = (row) => {
            if (row.item_kind === 'VE') return row.value || row.name || row.key || '-';
            if (row.token) return row.token;
            if (row.ref) return `VK:${row.scope || 'LOCAL'}:${row.ref}`;
            return row.name || '-';
        };

    async function loadVaultItemSyncStatus() {
        if (!state.selectedVault || activeTab() !== '키 / 환경값') {
            state.vaultItemSyncStatus = {};
            return;
        }

        const nextStatus = {};
        const vaults = state.vaults || [];
        const total = vaults.length || 1;
        const currentVaultHash = state.selectedVault.vault_runtime_hash;

        const configInventoryByVault = {};
        const keyInventoryByVault = {};

        function summarizeInventory(items, currentName, currentValue, nameField) {
            const summary = emptyVaultSyncStats(total);
            items.forEach((rows) => {
                const sameName = rows.find((row) => String(row[nameField] || '') === currentName);
                if (sameName) {
                    summary.present += 1;
                    if (sameName.value === currentValue) {
                        summary.nameValueMatch += 1;
                    } else {
                        summary.nameOnlyMatch += 1;
                    }
                } else {
                    summary.missing += 1;
                }
                if (currentValue !== null && currentValue !== undefined && currentValue !== '' && rows.some((row) => String(row[nameField] || '') !== currentName && row.value === currentValue)) {
                    summary.valueOnlyMatch += 1;
                }
            });
            return summary;
        }

        await Promise.all(vaults.map(async (vault) => {
            const vaultHash = vault.vault_runtime_hash;
            try {
                const configData = await request('/api/agents/' + encodeURIComponent(vaultHash) + '/configs');
                configInventoryByVault[vaultHash] = (configData.configs || []).map((item) => ({
                    key: item.key,
                    value: item.value
                }));
            } catch (_) {
                configInventoryByVault[vaultHash] = [];
            }

            try {
                const keyData = await request('/api/vaults/' + encodeURIComponent(vaultHash) + '/keys');
                const keyRows = await Promise.all((keyData.secrets || []).map(async (item) => {
                    try {
                        const detail = await request('/api/vaults/' + encodeURIComponent(vaultHash) + '/keys/' + encodeURIComponent(item.name));
                        return {
                            name: item.name,
                            value: detail && detail.value !== undefined ? detail.value : null
                        };
                    } catch (_) {
                        return null;
                    }
                }));
                keyInventoryByVault[vaultHash] = keyRows.filter(Boolean);
            } catch (_) {
                keyInventoryByVault[vaultHash] = [];
            }
        }));

        state.configVaultItems.forEach((item) => {
            const inventories = vaults.map((vault) => configInventoryByVault[vault.vault_runtime_hash] || []);
            nextStatus[vaultItemSyncKey('VE', item.key)] = summarizeInventory(inventories, item.key, item.value, 'key');
        });

        state.vaultKeys.forEach((item) => {
            const currentRows = keyInventoryByVault[currentVaultHash] || [];
            const currentRow = currentRows.find((row) => row.name === item.name) || null;
            const inventories = vaults.map((vault) => keyInventoryByVault[vault.vault_runtime_hash] || []);
            nextStatus[vaultItemSyncKey('VK', item.name)] = summarizeInventory(inventories, item.name, currentRow ? currentRow.value : null, 'name');
        });

        state.vaultItemSyncStatus = nextStatus;
    }

    async function loadGroupedRows() {
        const kind = activeTab() === '환경값' ? 'VE' : 'VK';
        const groupedMap = new Map();
        const tasks = state.vaults.map(async (vault) => {
            if (kind === 'VK') {
                const data = await request('/api/vaults/' + encodeURIComponent(vault.vault_runtime_hash) + '/keys');
                (data.secrets || []).forEach((item) => {
                    const key = item.name;
                    const entry = {
                        kind: 'VK',
                        name: item.name,
                        scope: item.scope || 'LOCAL',
                        status: item.status || 'active',
                        vault_name: vault.display_name || vault.vault_name || vault.label || vault.vault_runtime_hash,
                        vault_runtime_hash: vault.vault_runtime_hash,
                        vault_id: vault.vault_id || vault.vault_runtime_hash,
                        path: (vault.managed_paths && vault.managed_paths[0]) || '-',
                        ip: vault.ip || '-',
                        updated_at: item.updated_at || '',
                        usage_count: item.usage_count || item.binding_count || 0
                    };
                    if (!groupedMap.has(key)) groupedMap.set(key, []);
                    groupedMap.get(key).push(entry);
                });
                return;
            }

            const data = await request('/api/agents/' + encodeURIComponent(vault.vault_runtime_hash) + '/configs');
            (data.configs || []).forEach((item) => {
                const key = item.key;
                const entry = {
                    kind: 'VE',
                    name: item.key,
                    scope: item.scope || 'LOCAL',
                    status: item.status || 'active',
                    vault_name: vault.display_name || vault.vault_name || vault.label || vault.vault_runtime_hash,
                    vault_runtime_hash: vault.vault_runtime_hash,
                    vault_id: vault.vault_id || vault.vault_runtime_hash,
                    path: (vault.managed_paths && vault.managed_paths[0]) || '-',
                    ip: vault.ip || '-',
                    updated_at: item.updated_at || '',
                    usage_count: 0
                };
                if (!groupedMap.has(key)) groupedMap.set(key, []);
                groupedMap.get(key).push(entry);
            });
        });

        await Promise.all(tasks);
        state.groupedRows = Array.from(groupedMap.entries()).map(([name, entries]) => {
            const currentVaultMatch = state.selectedVault ? entries.find((entry) => entry.vault_runtime_hash === state.selectedVault.vault_runtime_hash) : null;
            const localMatch = entries.find((entry) => entry.scope === 'LOCAL');
            const representative = currentVaultMatch || localMatch || entries[0];
            return {
                kind,
                name,
                count: entries.length,
                representative,
                entries
            };
        }).sort((a, b) => a.name.localeCompare(b.name));
        if (!state.selectedGroupedName && state.groupedRows.length) {
            state.selectedGroupedName = state.groupedRows[0].name;
            state.selectedGroupedEntries = state.groupedRows[0].entries;
            state.selectedGroupedEntry = state.groupedRows[0].entries[0] || null;
        }
    }

    async function loadGroupedEntryDetail() {
        if (!state.selectedGroupedEntry) return;
        state.revealValue = false;
        if (state.selectedGroupedEntry.kind === 'VK') {
            state.selectedVault = state.vaults.find((item) => item.vault_runtime_hash === state.selectedGroupedEntry.vault_runtime_hash) || state.selectedVault;
            state.selectedKey = { name: state.selectedGroupedEntry.name };
            await loadSelectedKeyDetail();
            await loadSelectedKeySummary();

        }
        state.selectedConfigVault = state.selectedGroupedEntry.vault_runtime_hash;
        state.selectedConfigKey = state.selectedGroupedEntry.name;

    async function syncPageData() {
        try {
            if (state.activePage === 'vaults') {
                if (!state.vaults.length) await loadVaults();
                if (state.selectedVault) {
                    await loadSelectedVaultDetail();
                    if (activeTab() !== 'Host Vault') {
                        await loadSelectedVaultKeys();
                        state.selectedConfigVault = state.selectedVault.vault_runtime_hash;
                        await loadConfigsForVault();
                        await loadVaultItemSyncStatus();
                    }
                    if (activeTab() === 'Host Vault') {
                        await loadHostVaultKeys();
                        await loadHostVaultConfigs();
                        const useHostConfigDetail = state.vaultItemKind === 'VE'
                            || (state.vaultItemKind === 'ALL' && state.hostSelectedItemKind === 'VE');
                        if (useHostConfigDetail) {
                            await loadHostVaultConfigDetail();
                        } else {
                            await loadHostVaultKeyDetail();
                        }
                    } else if (activeTab() === '키 / 환경값') {
                        const useConfigDetail = state.vaultItemKind === 'VE'
                            || (state.vaultItemKind === 'ALL' && state.selectedVaultItemKind === 'VE');
                        if (useConfigDetail) {
                            if (state.selectedConfigKey) {
                                await loadSelectedConfigDetail();
                                await loadConfigRelations();
                            } else {
                                state.configDetail = null;
                                state.configRelations = [];
                            }
                            state.revealValue = false;
                        } else {
                            await loadSelectedKeyDetail();
                            await loadSelectedKeySummary();
                            state.configRelations = [];
                            state.revealValue = false;
                        }
                    }
                }
            } else if (state.activePage === 'functions') {
                await loadFunctions();
                if (state.selectedFunction) {
                    await loadSelectedFunctionDetail();
                    if (activeTab() === '연결 관리') {
                        await loadSelectedFunctionBindings();
                    } else if (activeTab() === '영향도') {
                        await loadSelectedFunctionImpact();
                    }
                }
            } else if (state.activePage === 'audit') {
                if (!state.vaults.length) await loadVaults();
                await loadTrackedRefAudit();
                if (!state.auditVault && state.vaults.length) state.auditVault = state.vaults[0].vault_runtime_hash;
                await loadAuditVaultFeed();
            } else if (state.activePage === 'settings') {
                await loadUIConfig();
                await loadSystemUpdate();
            }
            setMessage(null, null);
        } catch (err) {
            setMessage('error', err.message);
        }
        render();
    }
