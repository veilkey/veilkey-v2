# Shannon entropy settings
entropy:
  min_length: 16
  threshold: 3.5
  confidence_boost: 20

# Exclusion rules (matches to these patterns are excluded from detection)
excludes:
  - '(?i)example|test|dummy|placeholder|xxx|your[_\-]|changeme|fixme'
  - '(?i)^(true|false|null|none|undefined|localhost|127\.0\.0\.1|0\.0\.0\.0)$'
  - '^\*+$'
  - '(?i)^(todo|n\/a|tbd|na|disabled|enabled)$'
  - '<[^>]+>'

# Sensitive variable names (extra confidence boost when these keywords appear nearby)
sensitive_context:
  keywords:
    - password
    - passwd
    - secret
    - token
    - api_key
    - apikey
    - private_key
    - client_secret
    - access_key
    - auth
    - credential
  confidence_boost: 15
