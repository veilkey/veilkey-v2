[proxy.default]
listen = "0.0.0.0:18080"
url = "http://<PROXY_IP>:18080"
no_proxy = "127.0.0.1,localhost,.<INTERNAL_DOMAIN>,.<VHOST_DOMAIN>"
plaintext_action = "issue-temp-and-block"
allow_hosts_enabled = false
allow_hosts = []

[proxy.tools.codex]
listen = "0.0.0.0:18081"
url = "http://<PROXY_IP>:18081"
plaintext_action = "issue-temp-and-block"
plaintext_resolve_hosts = ["api.openai.com"]
allow_hosts_enabled = false
allow_hosts = []

[proxy.tools.claude]
listen = "0.0.0.0:18084"
url = "http://<PROXY_IP>:18084"
plaintext_action = "issue-temp-and-block"
allow_hosts_enabled = false
allow_hosts = []

[proxy.tools.opencode]
listen = "0.0.0.0:18083"
url = "http://<PROXY_IP>:18083"
plaintext_action = "issue-temp-and-block"
allow_hosts_enabled = false
allow_hosts = []

[tools.codex]
bin = "/usr/bin/codex"
proxy = "codex"

[tools.claude]
bin = "/usr/local/bin/claude"
proxy = "claude"

[tools.opencode]
bin = "/usr/local/bin/opencode"
proxy = "opencode"

[rewrite]
request_surfaces = ["headers", "query", "body"]
body_content_types = ["application/json", "application/x-www-form-urlencoded", "text/plain"]
plaintext_action = "issue-temp-and-resolve"
connect_tunnel_inspection = false
