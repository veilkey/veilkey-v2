stages:
  - lint
  - test
  - security
  - build

default:
  before_script:
    - cd services/proxy

go:lint:
  stage: lint
  script:
    - golangci-lint run ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

go:test:
  stage: test
  script:
    - go test -race -coverprofile=coverage.out ./...
    - bash tests/run-shell-tests.sh
    - |
      COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | sed 's/%//')
      if [ -z "$COVERAGE" ]; then echo "ERROR: could not parse coverage from coverage.out"; exit 1; fi
      echo "Coverage: ${COVERAGE}%"
      if echo "$COVERAGE < 40" | bc -l | grep -q '^1'; then echo "Coverage ${COVERAGE}% is below 40% threshold"; exit 1; fi
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - services/proxy/coverage.out
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

gosec:
  stage: security
  script:
    - gosec ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

govulncheck:
  stage: security
  script:
    - govulncheck ./...
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared

# Minimal build gate for the observer/proxy scaffold.
go:build:
  stage: build
  script:
    - go build ./cmd/veilkey-proxy
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
  tags:
    - vhost-shell-runner-shared
