- id: veilkey-cli
  name: VeilKey Guard Secret Scanner
  description: Scans staged files for secrets, API keys, tokens, and credentials.
  entry: veilkey-cli scan --exit-code
  language: golang
  types: [text]
  stages: [pre-commit]
  pass_filenames: true
  require_serial: false
  minimum_pre_commit_version: '2.9.0'
