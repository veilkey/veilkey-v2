# Example .gitlab-ci.yml showing how to include VeilKey Guard scanning
#
# This file demonstrates integrating VeilKey Guard into a typical
# Laravel/PHP project CI pipeline.

stages:
  - test
  - deploy

# Include the VeilKey Guard scan template
include:
  - project: 'veilkey/veilkey'
    ref: main
    file: '/templates/gitlab-ci-veilkey.yml'

# Override VeilKey variables for this project
variables:
  VEILKEY_FORMAT: "sarif"
  VEILKEY_THRESHOLD: "0.6"
  VEILKEY_EXTRA_ARGS: "--exclude-dir vendor --exclude-dir node_modules --exclude-dir storage"

# The veilkey-scan job is automatically added by the included template.
# It runs in the "test" stage and scans changed files for secrets.

# Your other CI jobs continue as normal:

phpunit:
  stage: test
  image: php:8.4-cli
  script:
    - composer install --no-interaction
    - php artisan test

deploy-prod:
  stage: deploy
  script:
    - echo "Deploying to production..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - veilkey-scan
    - phpunit
