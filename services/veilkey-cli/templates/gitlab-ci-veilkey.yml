# VeilKey Guard CI Template
# Include this template in your .gitlab-ci.yml to add secret scanning.
#
# Usage:
#   include:
#     - project: 'veilkey/veilkey'
#       ref: main
#       file: '/templates/gitlab-ci-veilkey.yml'
#
# Customizable variables:
#   VEILKEY_VERSION    - Version to download (default: latest)
#   VEILKEY_FORMAT     - Output format: text, json, sarif, gitlab-sast (default: text)
#   VEILKEY_THRESHOLD  - Minimum confidence score to report (default: 0.7)
#   VEILKEY_EXTRA_ARGS - Additional arguments passed to veilkey-cli scan

variables:
  VEILKEY_VERSION: "latest"
  VEILKEY_FORMAT: "text"
  VEILKEY_THRESHOLD: "0.7"
  VEILKEY_EXTRA_ARGS: ""

veilkey-scan:
  stage: test
  image: alpine:3.21
  before_script:
    - apk add --no-cache curl git
    - |
      if [ "$VEILKEY_VERSION" = "latest" ]; then
        DOWNLOAD_URL="https://${CI_SERVER_HOST}/veilkey/veilkey/-/releases/permalink/latest/downloads/veilkey-cli-linux-amd64.tar.gz"
      else
        DOWNLOAD_URL="https://${CI_SERVER_HOST}/veilkey/veilkey/-/releases/v${VEILKEY_VERSION}/downloads/veilkey-cli-linux-amd64.tar.gz"
      fi
    - curl -sL "$DOWNLOAD_URL" | tar xz -C /usr/local/bin/
    - veilkey-cli --version
  script:
    - |
      # Determine changed files based on pipeline context
      if [ "$CI_MERGE_REQUEST_IID" ]; then
        echo "Scanning files changed in MR !${CI_MERGE_REQUEST_IID}..."
        CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}...HEAD")
      elif [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
        echo "Scanning files changed in push..."
        CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${CI_COMMIT_BEFORE_SHA}...${CI_COMMIT_SHA}")
      else
        echo "Scanning all tracked files..."
        CHANGED_FILES=$(git ls-files)
      fi

      if [ -z "$CHANGED_FILES" ]; then
        echo "No files to scan."
        exit 0
      fi

      echo "Files to scan:"
      echo "$CHANGED_FILES" | head -20
      TOTAL=$(echo "$CHANGED_FILES" | wc -l)
      if [ "$TOTAL" -gt 20 ]; then
        echo "... and $((TOTAL - 20)) more files"
      fi
      echo ""

      echo "$CHANGED_FILES" | xargs veilkey-cli scan \
        --exit-code \
        --format "$VEILKEY_FORMAT" \
        --threshold "$VEILKEY_THRESHOLD" \
        $VEILKEY_EXTRA_ARGS
  artifacts:
    when: always
    paths:
      - gl-secret-detection-report.json
    reports:
      secret_detection: gl-secret-detection-report.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
      when: never
  allow_failure: false
