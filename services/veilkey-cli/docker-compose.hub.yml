services:
  veilkey-vaultcenter:
    image: ${VEILKEY_REGISTRY:-ghcr.io}/veilkey/veilkey-vaultcenter:latest
    container_name: veilkey-vaultcenter
    ports:
      - "${VEILKEY_PORT:-10180}:10180"
    volumes:
      - veilkey-data:/data
      - ${VEILKEY_PASSWORD_DIR:-./secrets}/password:/run/secrets/veilkey_password:ro
      - ${VEILKEY_TLS_DIR:-/etc/veilkey/tls}:/etc/veilkey/tls:ro
    environment:
      VEILKEY_PASSWORD_FILE: /run/secrets/veilkey_password
      VEILKEY_MODE: ${VEILKEY_MODE:-root}
      VEILKEY_ADDR: ":10180"
      VEILKEY_DB_PATH: /data/veilkey.db
      VEILKEY_TRUSTED_IPS: ${VEILKEY_TRUSTED_IPS:-127.0.0.1}
      VEILKEY_PARENT_URL: ${VEILKEY_PARENT_URL:-}
      VEILKEY_LABEL: ${VEILKEY_LABEL:-}
      VEILKEY_TLS_CERT: ${VEILKEY_TLS_CERT:-}
      VEILKEY_TLS_KEY: ${VEILKEY_TLS_KEY:-}
      VEILKEY_TLS_CA: ${VEILKEY_TLS_CA:-}
    restart: unless-stopped

volumes:
  veilkey-data:
