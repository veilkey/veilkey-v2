stages:
  - verify
  - test
  - build
  - package
  - docker
  - deploy

test:
  stage: test
  script:
    - CGO_ENABLED=1 go test -v -race -count=1 ./...
  tags:
    - vhost-shell-runner-shared

build:
  stage: build
  script:
    - CGO_ENABLED=1 go build -o veilkey-localvault ./cmd/
  artifacts:
    paths:
      - veilkey-localvault
    expire_in: 1 week
  tags:
    - vhost-shell-runner-shared

package:
  stage: package
  needs:
    - job: build
      artifacts: true
  script:
    - PKG_NAME="veilkey-localvault"
    - PKG_VERSION="${CI_COMMIT_SHA}"
    - mkdir -p dist/package
    - install -m 755 veilkey-localvault dist/package/veilkey-localvault
    - install -m 644 README.md dist/package/README.md
    - mkdir -p dist/package/scripts
    - install -m 755 scripts/deploy-lxc.sh dist/package/scripts/deploy-lxc.sh
    - tar -C dist/package -czf "dist/${PKG_NAME}.tar.gz" .
    - sha256sum "dist/${PKG_NAME}.tar.gz" | awk '{print $1}' > "dist/${PKG_NAME}.tar.gz.sha256"
    - echo "SHA256 checksum:" && cat "dist/${PKG_NAME}.tar.gz.sha256"
    - |
      PACKAGE_API_URL="${VEILKEY_GITLAB_API_URL:-http://10.50.100.210/api/v4}"
      PACKAGE_TOKEN="${VEILKEY_GITLAB_PACKAGE_PAT:-}"
      if [[ -z "${PACKAGE_TOKEN}" ]]; then
        PACKAGE_TOKEN="$(printf 'protocol=http\nhost=10.50.100.210\n\n' | git credential fill | awk -F= '/^password=/{print $2}')"
      fi
      curl --fail --header "PRIVATE-TOKEN: ${PACKAGE_TOKEN}" \
        --upload-file "dist/${PKG_NAME}.tar.gz" \
        "${PACKAGE_API_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_NAME}/${PKG_VERSION}/${PKG_NAME}.tar.gz"
      curl --fail --header "PRIVATE-TOKEN: ${PACKAGE_TOKEN}" \
        --upload-file "dist/${PKG_NAME}.tar.gz.sha256" \
        "${PACKAGE_API_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_NAME}/${PKG_VERSION}/${PKG_NAME}.tar.gz.sha256"
  artifacts:
    paths:
      - dist/veilkey-localvault.tar.gz
      - dist/veilkey-localvault.tar.gz.sha256
    expire_in: 1 week
  tags:
    - vhost-shell-runner-shared
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"

docker:
  stage: docker
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - DOCKER_BUILDKIT=0 docker build
      --build-arg DOCKER_MIRROR="$DOCKER_MIRROR"
      -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      -t "$CI_REGISTRY_IMAGE:main"
      -t "$CI_REGISTRY_IMAGE:latest"
      .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:main"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true
  tags:
    - shell

deploy:
  stage: deploy
  script:
    - bash scripts/deploy-lxc.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - proxmox-host


mr-guard:
  stage: verify
  script:
    - bash tests/test_mr_guard.sh
    - bash tests/policy/project_registry_policy.sh --self-test
    - bash tests/test_gitlab_project_settings.sh --self-test
    - bash tests/test_gitlab_project_settings.sh
    - bash tests/test_deploy_lxc.sh
    - bash tests/test_deploy_lxc_env_migration.sh
    - bash scripts/check-mr-guard.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
  tags:
    - vhost-shell-runner-shared
